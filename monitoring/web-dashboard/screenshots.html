{% extends "base.html" %}
{% set active = "screenshots" %}
{% block title %}Screenshots - Trading Bot v4.0{% endblock %}
{% block head %}
<style>
.upload-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.upload-btn { background: #00d2ff; color: #0a0e1a; border: none; padding: 8px 20px; border-radius: 6px; font-weight: 600; font-size: 13px; cursor: pointer; }
.upload-btn:hover { opacity: 0.85; }
.upload-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.screenshots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.ss-card { background: #141a23; border-radius: 10px; border: 1px solid #2a3344; overflow: hidden; }
.ss-card img { width: 100%; height: 180px; object-fit: cover; display: block; border-bottom: 1px solid #2a3344; }
.ss-card .ss-info { padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; }
.ss-card .ss-name { font-size: 12px; color: #c0d0e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.ss-card .ss-time { font-size: 10px; color: #667; }
.ss-card .delete-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; }
.ss-card .delete-btn:hover { background: #3a1a1a; }
.empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: #556; }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: #141a23; border: 1px solid #2a3344; border-radius: 10px; padding: 20px; width: 90%; max-width: 400px; }
.modal h3 { margin: 0 0 16px; color: #c0d0e0; }
.modal input { width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid #2a3344; background: #1a2233; color: #c0d0e0; font-size: 13px; box-sizing: border-box; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btn { padding: 8px 16px; border-radius: 6px; font-weight: 600; font-size: 13px; cursor: pointer; border: none; }
.modal-btn.primary { background: #00d2ff; color: #0a0e1a; }
.modal-btn.secondary { background: #1a2233; color: #c0d0e0; border: 1px solid #2a3344; }
.progress-bar { width: 100%; height: 6px; background: #1d2533; border-radius: 3px; overflow: hidden; margin: 8px 0; display: none; }
.progress-bar.show { display: block; }
.progress-bar .fill { height: 100%; width: 0%; background: #00d2ff; transition: width 0.2s; }
.upload-status { font-size: 12px; color: #667; min-height: 18px; }
</style>
{% endblock %}
{% block content %}
<div class="upload-bar">
  <button class="upload-btn" id="uploadBtn">&#x1f4c1; Upload Screenshots</button>
  <input type="file" accept="image/png,image/jpeg,image/gif" multiple style="display:none" id="fileInput">
  <div class="progress-bar" id="progressBar"><div class="fill"></div></div>
  <span class="upload-status" id="uploadStatus"></span>
</div>

<div class="screenshots-grid" id="ssGrid">
  <div class="empty-state">
    <div class="icon">&#x1f4f7;</div>
    <div>No screenshots uploaded yet</div>
  </div>
</div>

<div class="modal-overlay" id="keyModal">
  <div class="modal">
    <h3>Enter Upload Key</h3>
    <input type="password" id="keyInput" placeholder="Upload key" autocomplete="off">
    <div class="modal-actions">
      <button class="modal-btn secondary" id="cancelKey">Cancel</button>
      <button class="modal-btn primary" id="confirmKey">Upload</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function $(id) { return document.getElementById(id); }

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

let pendingFiles = [];
let uploadKey = '';

async function loadScreenshots() {
  try {
    const data = await fetchJSON('/api/uploads');
    const grid = $('ssGrid');
    if (!data.length) {
      grid.innerHTML = '<div class="empty-state"><div class="icon">&#x1f4f7;</div><div>No screenshots uploaded yet</div></div>';
      return;
    }
    grid.innerHTML = data.map(f => `
      <div class="ss-card" data-file="${f.name}">
        <a href="/uploads/${f.name}" target="_blank"><img src="/uploads/${f.name}" alt="${f.name}" loading="lazy"></a>
        <div class="ss-info">
          <div style="flex:1;min-width:0">
            <div class="ss-name">${f.name}</div>
            <div class="ss-time">${new Date(f.mtime).toLocaleString()} &middot; ${formatBytes(f.size)}</div>
          </div>
          <button class="delete-btn" onclick="deleteFile('${f.name}')" title="Delete">&#x2716;</button>
        </div>
      </div>
    `).join('');
  } catch(e) { console.error('Load screenshots error:', e); }
}

async function deleteFile(name) {
  if (!confirm('Delete ' + name + '?')) return;
  try {
    const r = await fetch('/api/uploads/' + name, { method: 'DELETE' });
    if (!r.ok) throw new Error(await r.text());
    const card = document.querySelector(`.ss-card[data-file="${name}"]`);
    if (card) card.remove();
  } catch(e) { alert('Failed: ' + e.message); }
}

function showKeyModal() {
  $('keyModal').classList.add('show');
  $('keyInput').value = '';
  $('keyInput').focus();
}

function hideKeyModal() {
  $('keyModal').classList.remove('show');
  pendingFiles = [];
}

function setUploading(isUploading) {
  const btn = $('uploadBtn');
  const status = $('uploadStatus');
  const progress = $('progressBar');
  const fill = progress.querySelector('.fill');
  
  if (isUploading) {
    btn.disabled = true;
    btn.textContent = 'Uploading...';
    progress.classList.add('show');
    fill.style.width = '0%';
    status.textContent = 'Preparing...';
  } else {
    btn.disabled = false;
    btn.textContent = '&#x1f4c1; Upload Screenshots';
    progress.classList.remove('show');
    fill.style.width = '0%';
  }
}

async function doUpload(files, key) {
  setUploading(true);
  const status = $('uploadStatus');
  const progress = $('progressBar');
  const fill = progress.querySelector('.fill');
  
  const form = new FormData();
  for (const f of files) form.append('file', f);
  
  try {
    const xhr = new XMLHttpRequest();
    
    xhr.upload.addEventListener('progress', (e) => {
      if (e.lengthComputable) {
        const percent = Math.round((e.loaded / e.total) * 100);
        fill.style.width = percent + '%';
        status.textContent = `Uploading... ${percent}%`;
      }
    });
    
    const result = await new Promise((resolve, reject) => {
      xhr.addEventListener('load', () => {
        if (xhr.status >= 200 && xhr.status < 300) {
          resolve(JSON.parse(xhr.responseText));
        } else {
          reject(new Error('Upload failed: ' + xhr.status));
        }
      });
      xhr.addEventListener('error', () => reject(new Error('Network error')));
      xhr.addEventListener('abort', () => reject(new Error('Upload cancelled')));
      xhr.open('POST', '/api/upload?key=' + encodeURIComponent(key));
      xhr.send(form);
    });
    
    if (result.errors.length) {
      status.textContent = 'Errors: ' + result.errors.join('; ');
    } else {
      status.textContent = 'Uploaded ' + result.saved.length + ' file(s)';
      fill.style.width = '100%';
    }
    loadScreenshots();
    setTimeout(() => { status.textContent = ''; }, 3000);
  } catch(e) {
    status.textContent = 'Upload failed: ' + e.message;
  } finally {
    setUploading(false);
  }
}

$('fileInput').addEventListener('change', function() {
  if (this.files.length) {
    pendingFiles = Array.from(this.files);
    showKeyModal();
  }
  this.value = '';
});

$('confirmKey').addEventListener('click', () => {
  const key = $('keyInput').value.trim();
  if (!key) { alert('Enter key'); return; }
  uploadKey = key;
  hideKeyModal();
  doUpload(pendingFiles, uploadKey);
});

$('cancelKey').addEventListener('click', () => {
  hideKeyModal();
});

$('keyInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') $('confirmKey').click();
});

$('keyModal').addEventListener('click', (e) => {
  if (e.target === $('keyModal')) hideKeyModal();
});

$('uploadBtn').addEventListener('click', () => {
  $('fileInput').click();
});

async function fetchJSON(url) { 
  const r = await fetch(url); 
  if (!r.ok) throw new Error(await r.text()); 
  return r.json(); 
}

loadScreenshots();
</script>
{% endblock %}
