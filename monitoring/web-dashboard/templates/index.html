<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Bot Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0b0e14; color: #e0e0e0; min-height: 100vh;
}
.header {
  background: linear-gradient(135deg, #141a23, #1a2233);
  padding: 20px 30px; display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid #2a3344;
}
.header h1 { font-size: 22px; font-weight: 600; color: #fff; }
.header .time { color: #8899aa; font-size: 13px; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
.stat-card {
  background: #141a23; border-radius: 10px; padding: 20px; text-align: center;
  border: 1px solid #2a3344; position: relative; overflow: hidden;
}
.stat-card .label { font-size: 12px; text-transform: uppercase; color: #8899aa; letter-spacing: 1px; margin-bottom: 8px; }
.stat-card .value { font-size: 32px; font-weight: 700; }
.stat-card .sub { font-size: 13px; color: #8899aa; margin-top: 4px; }
.stat-card .icon { position: absolute; right: 15px; top: 15px; font-size: 28px; opacity: 0.1; }
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.chart-card {
  background: #141a23; border-radius: 10px; padding: 16px;
  border: 1px solid #2a3344;
}
.chart-card .title { font-size: 14px; font-weight: 500; color: #c0d0e0; margin-bottom: 12px; }
.chart-card.full { grid-column: 1 / -1; }
.chart-wrap { position: relative; width: 100%; }
.chart-wrap.pie { max-height: 260px; }
.chart-wrap:not(.pie) { min-height: 250px; }
.table-card {
  background: #141a23; border-radius: 10px; padding: 16px; border: 1px solid #2a3344;
}
.table-card .title { font-size: 14px; font-weight: 500; color: #c0d0e0; margin-bottom: 12px; }
.trades-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.trades-table th { text-align: left; padding: 8px 10px; border-bottom: 1px solid #2a3344; color: #8899aa; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
.trades-table td { padding: 8px 10px; border-bottom: 1px solid #1d2533; }
.trades-table tr:hover td { background: #1a2233; }
.profit-pos { color: #22c55e; font-weight: 600; }
.profit-neg { color: #ef4444; font-weight: 600; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-buy { background: #1a3a2a; color: #22c55e; }
.badge-sell { background: #3a1a1a; color: #ef4444; }
.loading { text-align: center; padding: 40px; color: #556; font-size: 14px; }
@media (max-width: 768px) {
  .stats-row { grid-template-columns: 1fr; }
  .charts-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="header">
  <h1>Trading Bot v4.0 Performance</h1>
  <div class="time" id="headerTime"></div>
</div>
<div class="container">
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="label">Total Trades</div><div class="value" id="statTrades">—</div><div class="sub" id="statTradesSub"></div></div>
    <div class="stat-card"><div class="label">Win Rate</div><div class="value" id="statWinRate">—</div><div class="sub" id="statWinRateSub"></div></div>
    <div class="stat-card"><div class="label">Total P&amp;L</div><div class="value" id="statPL">—</div><div class="sub" id="statPLSub"></div></div>
  </div>

  <div class="charts-row">
    <div class="chart-card"><div class="title">Trades by Symbol</div><div class="chart-wrap pie"><canvas id="chartSymbolPie"></canvas></div></div>
    <div class="chart-card"><div class="title">Win Rate by Symbol</div><div class="chart-wrap"><canvas id="chartWinRate"></canvas></div></div>
  </div>

  <div class="charts-row">
    <div class="chart-card full"><div class="title">Profit Over Time</div><div class="chart-wrap"><canvas id="chartProfitTime"></canvas></div></div>
  </div>

  <div class="charts-row">
    <div class="chart-card"><div class="title">Score Distribution</div><div class="chart-wrap"><canvas id="chartScore"></canvas></div></div>
    <div class="chart-card"><div class="title">P&amp;L by Hour of Day</div><div class="chart-wrap"><canvas id="chartHour"></canvas></div></div>
  </div>

  <div class="table-card"><div class="title">Recent Trades</div>
    <div id="tradesLoading" class="loading">Loading trades...</div>
    <div id="tradesContainer" style="overflow-x:auto;display:none">
      <table class="trades-table"><thead><tr>
        <th>Time</th><th>Symbol</th><th>Type</th><th>Lot</th><th>Open</th><th>Close</th><th>Profit</th><th>Score</th><th>Comment</th>
      </tr></thead><tbody id="tradesBody"></tbody></table>
    </div>
  </div>
</div>

<script>
function $(id) { return document.getElementById(id); }

const chartColors = ['#22c55e','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316'];

let charts = {};

function fmtNum(n) { return Number(n).toLocaleString('en-US', {maximumFractionDigits:2}); }
function fmtDollar(n) { return Number(n).toLocaleString('en-US', {style:'currency',currency:'USD',minimumFractionDigits:2}); }

function updateTime() {
  const now = new Date();
  $('headerTime').textContent = 'Last updated: ' + now.toLocaleTimeString() + ' | ' + now.toLocaleDateString();
}

async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadData() {
  try {
    const [stats, symbolCounts, winRates, profitTime, scores, hours, trades] = await Promise.all([
      fetchJSON('/api/stats'),
      fetchJSON('/api/trades-by-symbol'),
      fetchJSON('/api/win-rate-by-symbol'),
      fetchJSON('/api/profit-over-time'),
      fetchJSON('/api/score-distribution'),
      fetchJSON('/api/profit-by-hour'),
      fetchJSON('/api/recent-trades'),
    ]);

    renderStats(stats);
    renderSymbolPie(symbolCounts);
    renderWinRate(winRates);
    renderProfitTime(profitTime);
    renderScore(scores);
    renderHour(hours);
    renderTrades(trades);
    updateTime();
  } catch(e) {
    console.error('Failed to load data:', e);
  }
}

function renderStats(s) {
  $('statTrades').textContent = fmtNum(s.total_trades);
  $('statTradesSub').textContent = s.closed_trades + ' closed / ' + s.open_trades + ' open';
  if (s.closed_trades > 0) {
    $('statWinRate').textContent = s.win_rate + '%';
    $('statWinRateSub').textContent = s.wins + ' wins / ' + s.losses + ' losses';
    const pl = s.total_pl;
    $('statPL').textContent = fmtDollar(Math.abs(pl));
    $('statPL').style.color = pl >= 0 ? '#22c55e' : '#ef4444';
    $('statPLSub').textContent = pl >= 0 ? 'Profit' : 'Loss';
  } else {
    $('statWinRate').textContent = 'N/A';
    $('statWinRateSub').textContent = 'no closed trades';
    $('statPL').textContent = 'N/A';
    $('statPL').style.color = '#8899aa';
    $('statPLSub').textContent = 'no closed trades';
  }
}

function newChart(id, config) {
  if (charts[id]) { charts[id].destroy(); }
  charts[id] = new Chart($(id).getContext('2d'), config);
}

function renderSymbolPie(data) {
  newChart('chartSymbolPie', {
    type: 'pie',
    data: {
      labels: data.map(d => d.symbol),
      datasets: [{
        data: data.map(d => d.count),
        backgroundColor: chartColors.slice(0, data.length),
        borderWidth: 0,
      }]
    },
    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'right', labels: { color: '#c0d0e0' } } } }
  });
}

function renderWinRate(data) {
  newChart('chartWinRate', {
    type: 'bar',
    data: {
      labels: data.map(d => d.symbol),
      datasets: [{
        label: 'Win Rate %',
        data: data.map(d => d.win_rate),
        backgroundColor: data.map(d => d.win_rate >= 50 ? '#22c55e' : '#ef4444'),
        borderRadius: 4,
      }]
    },
    options: { responsive: true, maintainAspectRatio: true, scales: { y: { beginAtZero: true, max: 100, ticks: { color: '#8899aa' }, grid: { color: '#1d2533' } }, x: { ticks: { color: '#c0d0e0' } } }, plugins: { legend: { display: false } } }
  });
}

function renderProfitTime(data) {
  newChart('chartProfitTime', {
    type: 'line',
    data: {
      labels: data.map(d => d.time),
      datasets: [{
        label: 'Profit',
        data: data.map(d => d.profit),
        borderColor: '#22c55e',
        backgroundColor: 'rgba(34,197,94,0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 2,
      }]
    },
    options: { responsive: true, maintainAspectRatio: true, scales: { x: { type: 'time', time: { tooltipFormat: 'MMM d, HH:mm', displayFormats: { hour: 'MMM d HH:mm' } }, ticks: { color: '#8899aa', maxTicksLimit: 10 }, grid: { color: '#1d2533' } }, y: { ticks: { color: '#8899aa', callback: v => '$' + v }, grid: { color: '#1d2533' } } }, plugins: { legend: { display: false } } }
  });
}

function renderScore(data) {
  newChart('chartScore', {
    type: 'bar',
    data: {
      labels: data.map(d => d.bucket + '-' + (d.bucket + 9)),
      datasets: [{
        label: 'Trades',
        data: data.map(d => d.count),
        backgroundColor: '#3b82f6',
        borderRadius: 4,
      }]
    },
    options: { responsive: true, maintainAspectRatio: true, scales: { y: { beginAtZero: true, ticks: { color: '#8899aa' }, grid: { color: '#1d2533' } }, x: { ticks: { color: '#c0d0e0' } } }, plugins: { legend: { display: false } } }
  });
}

function renderHour(data) {
  newChart('chartHour', {
    type: 'bar',
    data: {
      labels: data.map(d => d.hour + ':00'),
      datasets: [{
        label: 'P&L',
        data: data.map(d => d.profit),
        backgroundColor: data.map(d => d.profit >= 0 ? '#22c55e' : '#ef4444'),
        borderRadius: 3,
      }]
    },
    options: { responsive: true, maintainAspectRatio: true, scales: { y: { ticks: { color: '#8899aa', callback: v => '$' + v }, grid: { color: '#1d2533' } }, x: { ticks: { color: '#c0d0e0' } } }, plugins: { legend: { display: false } } }
  });
}

function renderTrades(data) {
  $('tradesLoading').style.display = 'none';
  $('tradesContainer').style.display = 'block';
  const tbody = $('tradesBody');
  tbody.innerHTML = '';
  for (const t of data) {
    const tr = document.createElement('tr');
    const profitClass = t.profit >= 0 ? 'profit-pos' : 'profit-neg';
    const typeClass = t.type === 'BUY' ? 'badge-buy' : 'badge-sell';
    tr.innerHTML = `
      <td>${new Date(t.time).toLocaleString()}</td>
      <td><b>${t.symbol}</b></td>
      <td><span class="badge ${typeClass}">${t.type}</span></td>
      <td>${t.lot}</td>
      <td>${t.open_price}</td>
      <td>${t.close_price}</td>
      <td class="${profitClass}">${t.profit >= 0 ? '+' : ''}${fmtDollar(Math.abs(t.profit))}</td>
      <td>${t.score}</td>
      <td>${t.comment || ''}</td>`;
    tbody.appendChild(tr);
  }
}

loadData();
setInterval(loadData, 30000);
</script>

<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</body>
</html>
