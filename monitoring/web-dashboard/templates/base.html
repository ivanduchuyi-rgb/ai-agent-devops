<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Trading Bot Dashboard{% endblock %}</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0b0e14; color: #e0e0e0; min-height: 100vh;
}
.nav {
  background: linear-gradient(135deg, #141a23, #1a2233);
  padding: 0 20px; display: flex; align-items: center; gap: 4px;
  border-bottom: 1px solid #2a3344; position: sticky; top: 0; z-index: 100;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.nav-brand {
  font-size: 16px; font-weight: 700; color: #00d2ff; text-decoration: none;
  padding: 14px 16px 14px 0; margin-right: 8px; white-space: nowrap;
  border-right: 1px solid #2a3344;
}
.nav a {
  color: #8899aa; text-decoration: none; padding: 14px 16px; font-size: 13px;
  white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.2s;
}
.nav a:hover, .nav a.active { color: #00d2ff; border-bottom-color: #00d2ff; }
.container { max-width: 1400px; margin: 0 auto; padding: 16px; }
.loading { text-align: center; padding: 40px; color: #556; font-size: 14px; }
.skeleton { background: linear-gradient(90deg, #1a2233 25%, #1d2533 50%, #1a2233 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.toast {
  position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 8px;
  font-size: 14px; z-index: 999; display: none; max-width: 400px;
  animation: slideIn 0.3s ease;
}
.toast.ok { background: #1a3a2a; color: #22c55e; border: 1px solid #22c55e44; }
.toast.err { background: #3a1a1a; color: #ef4444; border: 1px solid #ef444444; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@media (max-width: 768px) {
  .container { padding: 10px; }
  .nav { padding: 0 10px; }
  .nav a { padding: 12px 10px; font-size: 12px; }
}
</style>
{% block head %}{% endblock %}
</head>
<body>
<div class="nav">
  <a href="/" class="nav-brand">&#x1f537; Bot v4.0</a>
  <a href="/" class="{% if active == 'dashboard' %}active{% endif %}">&#x1f4ca; Dashboard</a>
  <a href="/trading" class="{% if active == 'trading' %}active{% endif %}">&#x1f4c8; Trading</a>
  <a href="/system" class="{% if active == 'system' %}active{% endif %}">&#x1f5a5; System</a>
  <a href="/screenshots" class="{% if active == 'screenshots' %}active{% endif %}">&#x1f4f8; Screenshots</a>
</div>
<div class="container">
{% block content %}{% endblock %}
</div>
<div id="toast" class="toast"></div>
<script>
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type; t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 4000);
}
function fmtNum(n) { return Number(n).toLocaleString('en-US', {maximumFractionDigits:2}); }
function fmtDollar(n) { return Number(n).toLocaleString('en-US', {style:'currency',currency:'USD',minimumFractionDigits:2}); }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
